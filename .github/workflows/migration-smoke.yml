name: migration-smoke

# Reusable Phase 1 migration-smoke gate (Path B, closes BUG-078).
#
# Spins up a clean, pinned Postgres container, replays a repo's committed
# Supabase migrations from scratch, asserts the replay is clean + deterministic,
# and PII-scans the baseline. NO secrets; never connects to any Supabase project
# or prod. Adopt it from a product repo with a thin caller:
#
#   jobs:
#     migration-smoke:
#       uses: NexronS2025/nexron-ci/.github/workflows/migration-smoke.yml@v1
#
# The replay logic lives in scripts/migration-smoke/replay-smoke.sh in THIS repo,
# so the workflow checks this repo out alongside the caller to fetch the script.
# That second checkout is tokenless (this repo is public), keeping Phase 1
# secret-free.

on:
  workflow_call:
    inputs:
      migrations_dir:
        description: 'Path to the migrations directory in the caller repo.'
        type: string
        required: false
        default: 'supabase/migrations'
      pg_image:
        description: 'Pinned Postgres image (must match prod engine + roles + extensions).'
        type: string
        required: false
        default: 'supabase/postgres:17.6.1.084'

jobs:
  replay:
    name: replay-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Don't leave the job token in the checkout's git config — this gate
          # only reads files; it never pushes.
          persist-credentials: false

      - name: Checkout nexron-ci (replay-smoke script)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: NexronS2025/nexron-ci
          # Pin the script to the SAME immutable commit that @v1 resolved to for
          # this run, so callers keep using @v1 (reuse model intact, no
          # hand-bumping) yet can never be served retagged script code.
          # github.job_workflow_sha is the reusable-workflow's own commit SHA.
          # (If it is ever empty/unavailable, fall back to `v1` — the gate is
          # advisory with nil blast radius; see the PR notes / §3 Phase-2 prereq.)
          ref: ${{ github.job_workflow_sha }}
          path: .nexron-ci
          # Public repo: don't leave the job token in the checkout's git config.
          persist-credentials: false

      - name: Ensure ripgrep is on PATH (PII-scan dependency)
        # The replay script's PII/secret gate uses `rg` and its preflight aborts
        # (~7s, before any replay) if rg is missing. The GitHub-hosted runner does
        # not ship ripgrep, so install it here, BEFORE the scan runs. Guarded so it
        # is a no-op (and pays no apt cost) if a future runner image already has rg.
        run: |
          if command -v rg >/dev/null 2>&1; then
            echo "ripgrep already present: $(rg --version | head -n1)"
          else
            sudo apt-get update
            sudo apt-get install -y ripgrep
            echo "ripgrep installed: $(rg --version | head -n1)"
          fi

      - name: Run migration-smoke replay
        env:
          MIGRATIONS_DIR: ${{ inputs.migrations_dir }}
          PG_IMAGE: ${{ inputs.pg_image }}
        run: |
          chmod +x .nexron-ci/scripts/migration-smoke/replay-smoke.sh
          set +e
          .nexron-ci/scripts/migration-smoke/replay-smoke.sh > smoke.log 2>&1
          rc=$?
          set -e
          cat smoke.log
          {
            echo '### Migration-smoke replay'
            echo ''
            echo '```'
            cat smoke.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
